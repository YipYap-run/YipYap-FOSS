name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6


      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: web/node_modules
          key: npm-${{ hashFiles('web/package-lock.json') }}

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Go vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/yipyap ./cmd/yipyap/

      - name: Tests
        run: go test -v -race ./...

  goreleaser-check:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: self-hosted
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6


      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: web/node_modules
          key: npm-${{ hashFiles('web/package-lock.json') }}

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check

  docker:
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: read
    needs: [check]
    steps:
      - uses: actions/checkout@v6


      - name: Build Docker image
        run: docker build -t yipyap:test .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, docker]
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: web/node_modules
          key: npm-${{ hashFiles('web/package-lock.json') }}

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
