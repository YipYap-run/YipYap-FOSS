name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Build
        run: go build -o bin/yipyap ./cmd/yipyap/

      - name: Run tests
        run: go test -v -race ./...

  lint:
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Go vet
        run: go vet ./...

  goreleaser-check:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check

      - name: GoReleaser build snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: build --snapshot --clean

  docker:
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: read
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t yipyap:test .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, docker]
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
