name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Pull-request comments from forks only get write-access to secrets when
# the workflow is triggered via pull_request_target. The action runs on
# the base repository, never on fork-supplied code, so this is safe.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    # Only run on PR events, or on the specific recheck / signature
    # comments. Ignore unrelated comments.
    if: |
      github.event_name == 'pull_request_target' ||
      github.event.comment.body == 'recheck' ||
      github.event.comment.body == 'I have read the CLA and I hereby sign it.'
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # contributor-assistant/github-action was archived upstream but
        # the v2.6.1 release is the last working tag. No v2 floating tag
        # exists, which is why @v2 failed to resolve.
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # Default GITHUB_TOKEN is used for status + PR comments.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A fine-grained PAT with Contents:Write on this repository,
          # used to commit signatures. Store it as the CLA_BOT_TOKEN
          # secret in repository settings.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_BOT_TOKEN }}
        with:
          path-to-signatures: '.cla/signatures.json'
          path-to-document: 'https://github.com/YipYap-run/YipYap-FOSS/blob/main/CLA.md'
          branch: 'main'
          # WaffleThief123 is the project maintainer and does not need to
          # countersign their own CLA. Bots that will never sign (and whose
          # actions belong to the maintainer anyway) are explicitly listed.
          allowlist: 'WaffleThief123,dependabot[bot],renovate[bot],pre-commit-ci[bot]'
          # Exact comment contributors must leave to sign.
          custom-pr-sign-comment: 'I have read the CLA and I hereby sign it.'
          # Message posted on a PR when a contributor has not signed yet.
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge, we need
            you to agree to the [Contributor Licence Agreement](https://github.com/YipYap-run/YipYap-FOSS/blob/main/CLA.md).

            Please post the following comment on this pull request to record your signature:

            ```
            I have read the CLA and I hereby sign it.
            ```

            Once recorded, the CLA check will pass automatically.
          custom-allsigned-prcomment: 'All contributors on this pull request have signed the CLA. Thank you.'
