<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YipYap - Monitoring Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!--
    Google Fonts SRI trade-off: Google Fonts dynamically generates CSS per
    user-agent, so a stable SRI hash cannot be computed. Known risk accepted.
    To eliminate this entirely, self-host the font files and serve them from
    the same origin (e.g. via @fontsource packages or a local /fonts/ dir).
  -->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
</head>
<body>
  <script>
    // Apply theme before first paint to prevent flash
    (function() {
      var t = localStorage.getItem('yipyap-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
