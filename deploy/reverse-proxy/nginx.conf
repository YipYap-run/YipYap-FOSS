# YipYap reverse proxy example for nginx.
#
# Drop this file at /etc/nginx/sites-available/yipyap.conf and symlink into
# sites-enabled, or paste the server blocks into your existing config.
#
# Assumes:
#   - YipYap is running on 127.0.0.1:8080
#   - TLS certificates are managed by certbot at /etc/letsencrypt/live/<host>/
#   - The proxy host is yipyap.example.com (adjust below)

upstream yipyap {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name yipyap.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yipyap.example.com;

    ssl_certificate     /etc/letsencrypt/live/yipyap.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yipyap.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # Security headers. Strict-Transport-Security should only be set once
    # a permanent certificate is in place; remove during initial testing.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # WebSocket endpoint used by the UI for live monitor status updates.
    location /api/v1/ws {
        proxy_pass http://yipyap;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else: API + embedded UI.
    location / {
        proxy_pass http://yipyap;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Optional: tune upload size if you use custom webhooks with large bodies.
    client_max_body_size 4m;
}
